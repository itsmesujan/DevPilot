name: devpilot
description: "DevPilot Edge - unified AI operating layer for mobile & edge devices"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  dio: ^5.4.3
  http: ^1.2.1
  sqlite3: ^2.4.6
  sqlite3_flutter_libs: ^0.5.24
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0
  ffi: ^2.1.2
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0
  just_audio: ^0.9.40
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2
  flutter_markdown: ^0.6.23
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  file_picker: ^8.1.2
  share_plus: ^12.0.2
  device_info_plus: ^10.1.2
  battery_plus: ^6.0.3
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  html: ^0.15.4
  crypto: ^3.0.3
  llama_flutter_android: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/